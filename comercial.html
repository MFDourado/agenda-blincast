<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercial — Blincast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--black:#111111;--gold:#F5B800;--bg:#F7F6F2;--surface:#fff;--border:#E8E6DF;--text:#111111;--text-muted:#888880;--radius:10px;--radius-sm:6px;
--c-prospect:#1A5FC8;--c-prospect-bg:#EBF0FB;--c-convertido:#3B6D11;--c-convertido-bg:#EAF3DE;
--c-baixa:#3B6D11;--c-baixa-bg:#EAF3DE;--c-media:#B86A00;--c-media-bg:#FEF3E0;--c-urgente:#A32D2D;--c-urgente-bg:#FCEBEB;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
header{background:var(--black);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:2px;font-weight:500;}
.logo span{color:#444;margin:0 8px;}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#555;}
.status-dot.online{background:#2ecc71;}.status-dot.loading{background:var(--gold);}.status-dot.error{background:#e74c3c;}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
.page-header h2{font-size:18px;font-weight:600;}
.page-sync{font-size:12px;color:var(--text-muted);}
.btn-primary{height:36px;padding:0 20px;background:var(--black);color:var(--gold);border:none;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
.btn-primary:hover{opacity:.85;}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;}
.dropdown-filter{position:relative;}
.dropdown-trigger{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-muted);cursor:pointer;font-weight:500;transition:all .15s;user-select:none;}
.dropdown-trigger:hover{border-color:var(--text-muted);color:var(--text);}
.dropdown-trigger.has-selection{border-color:var(--black);background:var(--black);color:var(--gold);}
.dropdown-trigger .arrow{font-size:9px;transition:transform .15s;}
.dropdown-trigger.open .arrow{transform:rotate(180deg);}
.dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:180px;z-index:100;padding:6px;display:none;}
.dropdown-menu.open{display:block;}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text);transition:background .1s;}
.dropdown-item:hover{background:var(--bg);}
.dropdown-item.selected{font-weight:500;}
.dropdown-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s;}
.dropdown-item.selected .dropdown-check{background:var(--black);border-color:var(--black);color:var(--gold);}
.dropdown-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--gold);color:var(--black);font-size:10px;font-weight:700;}
.filter-clear{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.filter-clear:hover{border-color:#e00;color:#e00;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.prospect-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.prospect-card.convertido{border-color:var(--c-convertido);opacity:.85;}
.prospect-card.urgente{border-left:3px solid var(--c-urgente);}
.prospect-card.media{border-left:3px solid var(--c-media);}
.prospect-card.baixa{border-left:3px solid var(--c-baixa);}
.card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-nome{font-size:14px;font-weight:500;}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge.prospect{background:var(--c-prospect-bg);color:var(--c-prospect);}
.badge.convertido{background:var(--c-convertido-bg);color:var(--c-convertido);}
.badge.urgente{background:var(--c-urgente-bg);color:var(--c-urgente);}
.badge.media{background:var(--c-media-bg);color:var(--c-media);}
.badge.baixa{background:var(--c-baixa-bg);color:var(--c-baixa);}
.card-body{padding:10px 14px;}
.card-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;font-size:12px;}
.card-lbl{color:var(--text-muted);min-width:110px;flex-shrink:0;}
.card-val{color:var(--text);font-weight:500;}
.card-actions{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.btn-sm{padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text-muted);transition:all .15s;}
.btn-sm:hover{border-color:var(--text-muted);color:var(--text);}
.btn-sm.converter{background:var(--black);color:var(--gold);border-color:var(--black);font-weight:500;}
.btn-sm.converter:hover{opacity:.85;}
.btn-sm.danger:hover{border-color:#e00;color:#e00;}
.empty-state{text-align:center;padding:3rem;color:var(--text-muted);font-size:13px;grid-column:span 3;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:560px;border:1px solid var(--border);max-height:92vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1.25rem;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mf{margin-bottom:0;}
.mf.full{grid-column:span 2;}
.mf label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;}
.mf input,.mf select,.mf textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;height:36px;}
.mf textarea{height:60px;padding:8px 10px;resize:none;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--black);}
.sub-field{margin-top:8px;display:none;}
.sub-field.show{display:block;}
.sub-field input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;height:36px;}
.sub-field input:focus{border-color:var(--black);}
.section-title{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;grid-column:span 2;margin-top:4px;padding-top:12px;border-top:1px solid var(--border);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.modal-btn{height:36px;padding:0 20px;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text);}
.modal-btn.primary{background:var(--black);color:var(--gold);border-color:var(--black);}
.modal-btn:disabled{opacity:.4;cursor:not-allowed;}
.badge.vistoria_solicitada{background:#FEF3E0;color:#B86A00;}
.badge.vistoria_concluida{background:#EAF3DE;color:#3B6D11;}
.vistoria-ind{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}
.vistoria-ind.none{background:#e74c3c;}
.vistoria-ind.andamento{background:#F5B800;}
.vistoria-ind.concluida{background:#2ecc71;}
.com-tab{padding:12px 24px;font-size:14px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;background:none;border-left:none;border-right:none;border-top:none;letter-spacing:.3px;}
.com-tab:hover{color:#bbb;}
.com-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
footer{position:fixed;bottom:12px;right:16px;font-size:11px;font-family:'DM Mono',monospace;color:#C0C0C0;font-weight:700;letter-spacing:1px;pointer-events:none;}
</style>
</head>
<body>
<header>
  <div class="logo">BLINCAST <span>|</span> COMERCIAL</div>
  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-txt">Conectando...</span>
  </div>
</header>
<div style="display:flex;background:var(--black);border-top:1px solid #1e1e1e;padding:0 2rem;">
  <button class="com-tab active" id="ct-prospects" onclick="switchComTab('prospects')">Prospects</button>
  <button class="com-tab" id="ct-clientes" onclick="switchComTab('clientes')">Clientes</button>
</div>
<div id="com-page-prospects">
<div class="main">
  <div class="page-header">
    <div>
      <h2>Prospects</h2>
      <div class="page-sync" id="page-sync"></div>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Novo prospect</button>
  </div>
  <div style="display:flex;gap:24px;margin-bottom:1.5rem;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;">
    <!-- Status -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Status</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="prospect" onchange="applyFilter()" class="f-status"> Prospect</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="convertido" onchange="applyFilter()" class="f-status"> Convertido</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="vistoria_solicitada" onchange="applyFilter()" class="f-status"> Vistoria Solicitada</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="vistoria_concluida" onchange="applyFilter()" class="f-status"> Vistoria Realizada</label>
      </div>
    </div>
    <div style="width:1px;background:var(--border);"></div>
    <!-- Prioridade -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Prioridade</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="urgente" onchange="applyFilter()" class="f-prioridade"> Urgente</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="media" onchange="applyFilter()" class="f-prioridade"> Média</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="baixa" onchange="applyFilter()" class="f-prioridade"> Baixa</label>
      </div>
    </div>
    <div style="width:1px;background:var(--border);"></div>
    <!-- Vendedor -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Vendedor</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="Rafael" onchange="applyFilter()" class="f-vendedor"> Rafael</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="Victor Hugo" onchange="applyFilter()" class="f-vendedor"> Victor Hugo</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="Victor Xavier" onchange="applyFilter()" class="f-vendedor"> Victor Xavier</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="Diogo" onchange="applyFilter()" class="f-vendedor"> Diogo</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" value="Andre Gama" onchange="applyFilter()" class="f-vendedor"> André Gama</label>
      </div>
    </div>
    <div style="margin-left:auto;display:flex;align-items:flex-start;">
      <button onclick="clearFilters()" style="padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-muted);cursor:pointer;" onmouseover="this.style.color='#e00';this.style.borderColor='#e00'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">Limpar filtros</button>
    </div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- MODAL PROSPECT -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">Novo prospect</h3>
    <div class="modal-grid">
      <div class="mf full"><label>Nome do cliente *</label><input type="text" id="m-nome" placeholder="Ex: Hotel Beira Mar"></div>
      <div class="mf"><label>Cidade *</label><input type="text" id="m-cidade" placeholder="Ex: Recife"></div>
      <div class="mf"><label>CNPJ</label><input type="text" id="m-cnpj" placeholder="00.000.000/0000-00"></div>

      <div class="section-title">Contato</div>
      <div class="mf full"><label>Nome do contato</label><input type="text" id="m-contato-nome" placeholder="Ex: Joao Silva"></div>
      <div class="mf"><label>Telefone</label><input type="text" id="m-telefone" placeholder="Ex: (81) 99999-9999"></div>
      <div class="mf"><label>Endereco</label><input type="text" id="m-endereco" placeholder="Ex: Rua das Flores, 123"></div>

      <div class="section-title">Negociacao</div>
      <div class="mf"><label>Vendedor *</label>
        <select id="m-vendedor">
          <option value="">Selecione...</option>
          <option value="Rafael">Rafael</option>
          <option value="Victor Hugo">Victor Hugo</option>
          <option value="Victor Xavier">Victor Xavier</option>
          <option value="Diogo">Diogo</option>
          <option value="Andre Gama">Andre Gama</option>
        </select>
      </div>
      <div class="mf"><label>Prioridade *</label>
        <select id="m-prioridade">
          <option value="">Selecione...</option>
          <option value="baixa">Baixa</option>
          <option value="media">Media</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
      <div class="mf"><label>Produto *</label>
        <select id="m-produto" onchange="toggleProduto()">
          <option value="">Selecione...</option>
          <option value="HD">HD</option>
          <option value="SD">SD</option>
          <option value="STB">STB</option>
          <option value="STR">STR</option>
          <option value="OUTROS">OUTROS</option>
        </select>
        <div class="sub-field" id="produto-canais-wrap"><input type="number" id="m-canais" placeholder="Qtd. de canais" min="1"></div>
        <div class="sub-field" id="produto-outro-wrap"><input type="text" id="m-produto-outro" placeholder="Especifique o produto..."></div>
      </div>
      <div class="mf"><label>UHs *</label><input type="number" id="m-uhs" placeholder="Ex: 120" min="1"></div>
      <div class="mf"><label>Prazo para instalacao</label><input type="date" id="m-prazo"></div>
      <div class="mf"><label>Conteudo online?</label>
        <select id="m-conteudo" onchange="toggleConteudo()">
          <option value="Nao">Nao</option>
          <option value="Sim">Sim</option>
        </select>
        <div class="sub-field" id="conteudo-detalhe-wrap"><input type="text" id="m-conteudo-detalhe" placeholder="Qual plataforma?"></div>
      </div>
      <div class="mf"><label>Canal corporativo?</label>
        <select id="m-corp" onchange="toggleCorp()">
          <option value="Nao">Nao</option>
          <option value="Sim">Sim</option>
        </select>
        <div class="sub-field" id="corp-detalhe-wrap"><input type="text" id="m-corp-detalhe" placeholder="Observacao..."></div>
      </div>
    </div>
    <input type="hidden" id="m-edit-id">
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONVERSAO -->
<div class="modal-overlay" id="conv-modal" style="display:none">
  <div class="modal" style="max-width:400px">
    <h3>Contrato Assinado</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem">Cliente: <strong id="conv-nome"></strong></p>
    <div class="mf full">
      <label>Data do contrato *</label>
      <input type="date" id="conv-data">
    </div>
    <input type="hidden" id="conv-id">
    <div class="modal-actions">
      <button class="modal-btn" onclick="document.getElementById('conv-modal').style.display='none'">Cancelar</button>
      <button class="modal-btn primary" onclick="confirmarConversao()">Confirmar e enviar ao pipeline</button>
    </div>
  </div>
</div>

</div><!-- fim page-prospects -->
<div id="com-page-clientes" style="display:none">
<div class="main">
  <div class="pipeline-header">
    <div>
      <h2>Clientes</h2>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px" id="cli-sync"></div>
    </div>
    <button class="btn-primary" onclick="openNovoClienteModal()">+ Novo cliente</button>
  </div>
  <div id="cli-list"></div>
</div>
</div><!-- fim page-clientes -->

<!-- MODAL NOVO CLIENTE -->
<div class="modal-overlay" id="novo-cliente-modal" style="display:none">
  <div class="modal" style="max-width:580px;max-height:92vh;overflow-y:auto;">
    <h3>Novo cliente avulso</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="modal-field full"><label>Nome do cliente *</label><input type="text" id="nc-nome" placeholder="Ex: Hotel Beira Mar"></div>
      <div class="modal-field"><label>Cidade *</label><input type="text" id="nc-cidade" placeholder="Ex: Recife"></div>
      <div class="modal-field"><label>CNPJ</label><input type="text" id="nc-cnpj" placeholder="00.000.000/0000-00"></div>
      <div class="modal-field"><label>Contato</label><input type="text" id="nc-contato" placeholder="Nome do contato"></div>
      <div class="modal-field"><label>Telefone</label><input type="text" id="nc-telefone" placeholder="(00) 00000-0000"></div>
      <div class="modal-field full"><label>Endereco</label><input type="text" id="nc-endereco" placeholder="Rua, numero, cidade"></div>
      <div class="modal-field"><label>Produto *</label>
        <select class="field-sel" id="nc-produto">
          <option value="">Selecione...</option>
          <option value="HD">HD</option>
          <option value="SD">SD</option>
          <option value="STB">STB</option>
          <option value="STR">STR</option>
          <option value="OUTROS">OUTROS</option>
        </select>
      </div>
      <div class="modal-field"><label>UHs *</label><input type="number" id="nc-uhs" placeholder="Ex: 120" min="1"></div>
      <div class="modal-field"><label>Vigencia inicio *</label><input type="date" id="nc-vigencia"></div>
      <div class="modal-field"><label>Status</label>
        <select class="field-sel" id="nc-status">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
      <div style="grid-column:span 2;border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Registro de criacao avulsa</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="modal-field"><label>Responsavel *</label><input type="text" id="nc-responsavel" placeholder="Seu nome"></div>
          <div class="modal-field"><label>Motivo *</label><input type="text" id="nc-motivo" placeholder="Ex: Cliente ativo antes do sistema"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeNovoClienteModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="criarClienteAvulso()">Criar cliente</button>
    </div>
  </div>
</div>
<footer>&#169; 2026 Matheus Prateado</footer>

<script>
const API='https://script.google.com/macros/s/AKfycbwoEs-AW-7zJgxVimJkVWi0PUqBEsFfgSmd7h6l_oIElP8UfFYfBGSaen1R0znHLxKg/exec';
let prospects=[];
let filters={status:'todos',prioridade:'todos',vendedor:'todos'};

function setStatus(s,m){document.getElementById('status-dot').className='status-dot '+s;document.getElementById('status-txt').textContent=m;}

async function load(){
  setStatus('loading','Sincronizando...');
  try{
    const r=await fetch(API+'?action=getComercial');
    const d=await r.json();
    prospects=Array.isArray(d)?d:[];

    document.getElementById('page-sync').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

function setFilter(type,val){
  filters[type]=val;
  const prefix=type==='status'?'fs-':type==='prioridade'?'fp-':'fv-';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(prefix+(val==='todos'?'todos':val));
  if(el)el.classList.add('active');
  render();
}

function getChecked(cls){
  return Array.from(document.querySelectorAll('.'+cls+':checked')).map(el=>el.value);
}

function applyFilter(){ render(); }

function clearFilters(){
  document.querySelectorAll('.f-status,.f-prioridade,.f-vendedor').forEach(el=>el.checked=false);
  render();
}

function filtered(){
  const status=getChecked('f-status');
  const prio=getChecked('f-prioridade');
  const vend=getChecked('f-vendedor');
  return prospects.filter(p=>{
    if(status.length&&!status.includes(String(p.status)))return false;
    if(prio.length&&!prio.includes(String(p.prioridade)))return false;
    if(vend.length&&!vend.includes(String(p.vendedor)))return false;
    return true;
  });
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function prioLabel(p){return p==='urgente'?'Urgente':p==='media'?'Media':p==='baixa'?'Baixa':p||'';}
function formatDateBR(ds){if(!ds)return'';const[y,m,d]=String(ds).slice(0,10).split('-');return d+'/'+m+'/'+y;}

function closeModal(){document.getElementById('modal').style.display='none';}

async function salvar(){
  const nome=document.getElementById('m-nome').value.trim();
  const cidade=document.getElementById('m-cidade').value.trim();
  const uhs=document.getElementById('m-uhs').value;
  const produto=document.getElementById('m-produto').value;
  const vendedor=document.getElementById('m-vendedor').value;
  const prioridade=document.getElementById('m-prioridade').value;
  if(!nome||!cidade||!uhs||!produto||!vendedor||!prioridade){alert('Preencha os campos obrigatorios (*)');return;}
  const editId=document.getElementById('m-edit-id').value;
  const payload={
    nome,cidade,
    cnpj:document.getElementById('m-cnpj').value.trim(),
    contato:document.getElementById('m-contato-nome').value.trim(),
    telefone:document.getElementById('m-telefone').value.trim(),
    endereco:document.getElementById('m-endereco').value.trim(),
    vendedor,prioridade,
    produto:produto==='OUTROS'?'OUTROS - '+document.getElementById('m-produto-outro').value.trim():produto,
    canais:(produto==='HD'||produto==='SD')?document.getElementById('m-canais').value:'',
    conteudo_online:document.getElementById('m-conteudo').value,
    conteudo_detalhe:document.getElementById('m-conteudo-detalhe').value.trim(),
    canal_corporativo:document.getElementById('m-corp').value,
    canal_corp_detalhe:document.getElementById('m-corp-detalhe').value.trim(),
    uhs:parseInt(uhs)||0,
    prazo:document.getElementById('m-prazo').value,
  };
  closeModal();
  setStatus('loading','Salvando...');
  try{
    if(editId){
      await fetch(API,{method:'POST',body:JSON.stringify({action:'updateComercial',id:editId,...payload})});
    }else{
      await fetch(API,{method:'POST',body:JSON.stringify({action:'addComercial',id:uid(),...payload})});
    }
    await load();
  }catch(e){setStatus('error','Erro ao salvar');}
}

async function remover(id){
  if(!confirm('Remover este prospect?'))return;
  setStatus('loading','Removendo...');
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({action:'deleteComercial',id})});
    await load();
  }catch(e){setStatus('error','Erro ao remover');}
}

function converter(id){
  const p=prospects.find(x=>x.id==id);if(!p)return;
  document.getElementById('conv-id').value=id;
  document.getElementById('conv-nome').textContent=p.nome;
  document.getElementById('conv-data').value=new Date().toISOString().slice(0,10);
  document.getElementById('conv-modal').style.display='flex';
}

async function confirmarConversao(){
  const id=document.getElementById('conv-id').value;
  const data=document.getElementById('conv-data').value;
  if(!data){alert('Selecione a data do contrato.');return;}
  const p=prospects.find(x=>x.id==id);if(!p)return;
  document.getElementById('conv-modal').style.display='none';
  setStatus('loading','Convertendo...');
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({action:'converterPipeline',id:p.id,pid:uid(),nome:p.nome,uhs:p.uhs,cidade:p.cidade||'',cnpj:p.cnpj||'',contato:p.contato||'',produto:p.produto||'',conteudo_online:p.conteudo_online||'',conteudo_detalhe:p.conteudo_detalhe||'',data_contrato:data})});
    await load();
    setStatus('online','Convertido! E-mail enviado.');
  }catch(e){setStatus('error','Erro ao converter');}
}

async function solicitarVistoria(id){
  const p=prospects.find(x=>x.id==id);if(!p)return;
  if(p.status==='vistoria_concluida'){alert('Vistoria ja realizada para este prospect.');return;}
  const msg=p.status==='vistoria_solicitada'?'Vistoria ja solicitada. Deseja solicitar novamente?':'Solicitar vistoria tecnica para "'+p.nome+'"?';
  if(!confirm(msg))return;
  setStatus('loading','Solicitando vistoria...');
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({
      action:'solicitarVistoria',
      prospectId:p.id,
      vistoriaId:uid(),
      nomeCliente:p.nome,
      cidade:p.cidade||'',
      produto:p.produto||'',
      uhs:p.uhs||'',
      contato:p.contato||'',
      telefone:p.telefone||'',
      endereco:p.endereco||''
    })});
    await load();
    setStatus('online','Vistoria solicitada! E-mail enviado.');
  }catch(e){setStatus('error','Erro ao solicitar vistoria');}
}

async function loadClientes(){
  const syncEl = document.getElementById('cli-sync');
  if(syncEl) syncEl.textContent = 'Carregando...';
  try {
    const r = await fetch(API+'?action=getClientes');
    const d = await r.json();
    clientes = Array.isArray(d) ? d : [];
    if(syncEl) syncEl.textContent = 'Sincronizado - '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    renderClientes();
  } catch(e) { if(syncEl) syncEl.textContent = 'Erro de conexao'; }
}

async function saveCliente(clienteId){
  const cli = clientes.find(c=>c.id===clienteId); if(!cli)return;
  const get = id => { const el=document.getElementById(id); return el?el.value:''; };
  const getChk = id => { const el=document.getElementById(id); return el?el.checked:false; };

  const gradeAnexada = getChk('cli-grade-'+clienteId);
  const gradePor = get('cli-grade-por-'+clienteId);
  const produto = (cli.produto||'').toUpperCase();
  const precisaGrade = produto.includes('HD')||produto.includes('SD');

  if(precisaGrade && gradeAnexada && !gradePor.trim()){
    alert('Informe quem anexou a grade.');
    return;
  }
  if(precisaGrade && !gradeAnexada){
    if(!confirm('A grade de canais nao foi marcada como anexada. Deseja salvar mesmo assim?'))return;
  }

  const payload = {
    action: 'saveCliente',
    id: clienteId,
    nome: cli.nome,
    data_instalacao: get('cli-instalacao-'+clienteId),
    tecnico: get('cli-tecnico-'+clienteId),
    nf_envio: get('cli-nf-'+clienteId),
    os_instalacao: get('cli-os-'+clienteId),
    status: get('cli-status-'+clienteId),
    observacoes: get('cli-obs-'+clienteId),
    grade_anexada: gradeAnexada,
    grade_por: gradePor,
    link_contrato: get('cli-link-contrato-'+clienteId),
    link_projeto: get('cli-link-projeto-'+clienteId),
  };

  const btn = document.getElementById('cli-save-btn-'+clienteId);
  if(btn){ btn.textContent='Salvando...'; btn.disabled=true; }
  try {
    await fetch(API,{method:'POST',body:JSON.stringify(payload)});
    await loadClientes();
    if(btn){ btn.textContent='Salvo!'; setTimeout(()=>{btn.textContent='Salvar';btn.disabled=false;},2000); }
  } catch(e) {
    if(btn){ btn.textContent='Erro'; btn.disabled=false; }
  }
}

                <option value="inativo" ${c.status==='inativo'?'selected':''}>Inativo</option>
              </select>
              <label style="font-size:11px;color:var(--text-muted)">Observações</label>
              <textarea id="cli-obs-${c.id}" style="width:100%;border:1px solid var(--border);border-radius:4px;padding:6px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:60px">${c.observacoes||''}</textarea>
            </div>
          </div>

        </div>
        <div style="padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
          <button id="cli-save-btn-${c.id}" onclick="saveCliente('${c.id}')" class="btn-new-project">Salvar alterações</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleGradePor(id){
  const chk = document.getElementById('cli-grade-'+id);
  const wrap = document.getElementById('cli-grade-por-wrap-'+id);
  if(wrap) wrap.style.display = chk&&chk.checked ? 'block' : 'none';
}

function switchComTab(t){
  ['prospects','clientes'].forEach(tab=>{
    document.getElementById('ct-'+tab).className='com-tab'+(t===tab?' active':'');
    document.getElementById('com-page-'+tab).style.display=t===tab?'':'none';
  });
  if(t==='clientes') loadClientes();
}


function openNovoClienteModal(){
  ['nc-nome','nc-cidade','nc-cnpj','nc-contato','nc-telefone','nc-endereco','nc-uhs','nc-responsavel','nc-motivo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('nc-produto').value='';
  document.getElementById('nc-status').value='ativo';
  document.getElementById('nc-vigencia').value=new Date().toISOString().slice(0,10);
  document.getElementById('novo-cliente-modal').style.display='flex';
}
function closeNovoClienteModal(){document.getElementById('novo-cliente-modal').style.display='none';}

async function criarClienteAvulso(){
  const nome=document.getElementById('nc-nome').value.trim();
  const cidade=document.getElementById('nc-cidade').value.trim();
  const produto=document.getElementById('nc-produto').value;
  const uhs=document.getElementById('nc-uhs').value;
  const vigencia=document.getElementById('nc-vigencia').value;
  const responsavel=document.getElementById('nc-responsavel').value.trim();
  const motivo=document.getElementById('nc-motivo').value.trim();
  if(!nome||!cidade||!produto||!uhs||!vigencia||!responsavel||!motivo){alert('Preencha todos os campos obrigatorios (*)');return;}
  closeNovoClienteModal();
  setStatus('loading','Criando cliente...');
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({
      action:'criarCliente',id:uid(),prospectId:'avulso',
      nome,cidade,cnpj:document.getElementById('nc-cnpj').value.trim(),
      contato:document.getElementById('nc-contato').value.trim(),
      telefone:document.getElementById('nc-telefone').value.trim(),
      endereco:document.getElementById('nc-endereco').value.trim(),
      produto,uhs:parseInt(uhs)||0,vigencia_inicio:vigencia,
      status:document.getElementById('nc-status').value,
      responsavel_criacao:responsavel,motivo_criacao:motivo,
    })});
    await loadClientes();
    setStatus('online','Cliente criado!');
  }catch(e){setStatus('error','Erro ao criar cliente');}
}

load();
setInterval(load,60000);
</script>
</body>
</html>
